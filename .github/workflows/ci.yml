name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-extension:
    name: Build WASM Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - run: cargo build -p rest-client-extension --target wasm32-wasip1 --release

  build-lsp:
    name: Build LSP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p rest-client-lsp --release

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1
      - run: cargo fmt --check
      - run: cargo clippy -p rest-client-lsp -- -D warnings
