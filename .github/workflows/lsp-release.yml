name: LSP Release

on:
  push:
    tags:
      - "lsp-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: rest-client-lsp
            asset: rest-client-lsp-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            binary: rest-client-lsp
            asset: rest-client-lsp-aarch64-apple-darwin.tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: rest-client-lsp
            asset: rest-client-lsp-x86_64-unknown-linux-gnu.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: rest-client-lsp.exe
            asset: rest-client-lsp-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build -p rest-client-lsp --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset }} ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rest-client-lsp-x86_64-apple-darwin.tar.gz
            rest-client-lsp-aarch64-apple-darwin.tar.gz
            rest-client-lsp-x86_64-unknown-linux-gnu.tar.gz
            rest-client-lsp-x86_64-pc-windows-msvc.zip
          generate_release_notes: true
